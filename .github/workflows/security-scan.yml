name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write

env:
  GITLEAKS_VERSION: '8.30.1'
  TRIVY_VERSION: '0.69.3'

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout scanner config
        uses: actions/checkout@v4
        with:
          repository: cloudon-one/git-security-scanner-public
          ref: v3
          path: .scanner
          sparse-checkout: |
            gitleaks.toml
            git-audit-script.py
            run_scans.sh

      - name: Install Gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/
          rm gitleaks.tar.gz
          gitleaks version

      - name: Install Trivy
        run: |
          curl -sSfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            -o trivy.tar.gz
          tar -xzf trivy.tar.gz trivy
          sudo mv trivy /usr/local/bin/
          rm trivy.tar.gz
          trivy version

      - name: Prepare directories
        run: mkdir -p /tmp/scan-reports

      - name: Run Gitleaks scan
        run: |
          gitleaks detect \
            --source "${{ github.workspace }}" \
            --config .scanner/gitleaks.toml \
            --report-path /tmp/scan-reports/gitleaks-report.json \
            --report-format json \
            --exit-code 0

      - name: Run Trivy scan
        run: |
          trivy fs \
            --scanners vuln,misconfig \
            --severity UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL \
            --format json \
            --output /tmp/scan-reports/trivy-fs-report.json \
            --exit-code 0 \
            "${{ github.workspace }}"

      - name: Generate consolidated report
        id: scan
        run: |
          python3 .scanner/git-audit-script.py \
            --reports-dir /tmp/scan-reports \
            --repo-path "${{ github.workspace }}" \
            --action generate-summary

          REPORT="/tmp/scan-reports/json/final-security-report.json"
          if [[ -f "$REPORT" ]]; then
            RISK_LEVEL=$(jq -r '.executive_summary.risk_level // "UNKNOWN"' "$REPORT")
            SECRETS=$(jq -r '.executive_summary.gitleaks_secrets_found // 0' "$REPORT")
            VULNS=$(jq -r '.executive_summary.trivy_vulnerabilities_found // 0' "$REPORT")
            MISCONFIGS=$(jq -r '.executive_summary.trivy_misconfigurations_found // 0' "$REPORT")
            TOTAL=$(jq -r '.executive_summary.total_issues // 0' "$REPORT")

            echo "risk_level=${RISK_LEVEL}" >> $GITHUB_OUTPUT
            echo "secrets_found=${SECRETS}" >> $GITHUB_OUTPUT
            echo "vulnerabilities_found=${VULNS}" >> $GITHUB_OUTPUT
            echo "misconfigurations_found=${MISCONFIGS}" >> $GITHUB_OUTPUT
            echo "total_issues=${TOTAL}" >> $GITHUB_OUTPUT

            echo "## Security Scan Results"
            echo "================================"
            echo "Risk Level: ${RISK_LEVEL}"
            echo "Total Issues: ${TOTAL}"
            echo "Secrets Found: ${SECRETS}"
            echo "Vulnerabilities: ${VULNS}"
            echo "Misconfigurations: ${MISCONFIGS}"
            echo "================================"

            if [[ "$SECRETS" -gt 0 ]]; then
              echo "::error::Secrets detected in repository - immediate action required"
              exit 1
            fi
          else
            echo "::error::Report generation failed"
            exit 1
          fi

      - name: Validate reports
        if: always() && steps.scan.outputs.risk_level != ''
        run: |
          echo "Validating report artifacts..."
          REPORT="/tmp/scan-reports/json/final-security-report.json"

          # Validate JSON structure
          jq -e '.metadata.owner' "$REPORT" > /dev/null
          jq -e '.executive_summary.risk_level' "$REPORT" > /dev/null
          jq -e '.recommendations' "$REPORT" > /dev/null
          jq -e '.scan_details' "$REPORT" > /dev/null
          echo "[PASS] JSON report structure valid"

          # Validate HTML report
          HTML="/tmp/scan-reports/html/final-security-report.html"
          if [[ -f "$HTML" ]]; then
            SIZE=$(wc -c < "$HTML")
            echo "[PASS] HTML report: ${SIZE} bytes"
            grep -q '<!DOCTYPE html>' "$HTML" && echo "[PASS] HTML DOCTYPE present"
            grep -q 'Executive Summary' "$HTML" && echo "[PASS] Executive Summary section present"
            grep -q 'Recommendations' "$HTML" && echo "[PASS] Recommendations section present"
          else
            echo "::error::HTML report not generated"
            exit 1
          fi

          echo "All validations passed"

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results-${{ github.run_number }}
          path: /tmp/scan-reports/
          retention-days: 30
